name: Amazon Hatena Blog Auto Poster

on:
  schedule:
    # 毎日 朝9時(JST) = 0:00 UTC
    - cron: '0 0 * * *'
    # 毎日 夜7時(JST) = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      search_keywords:
        description: '検索キーワード（空欄ならタイムセール・売れ筋から自動選定）'
        required: false
        default: ''

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Japanese fonts
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq fonts-noto-cjk >/dev/null 2>&1

    - name: Run Auto Poster
      env:
        # Amazon Product Advertising API Credentials
        AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
        AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
        AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
        AMAZON_HOST: "webservices.amazon.co.jp"
        AMAZON_REGION: "us-west-2"

        # Hatena API Settings
        HATENA_ID: ${{ secrets.HATENA_ID }}
        HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
        HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}

        # 空欄 or 未指定 → amazon_hatena_poster.py が自動でタイムセール/売れ筋キーワードをローテーション
        SEARCH_KEYWORDS: ${{ github.event.inputs.search_keywords || '' }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python amazon_hatena_poster.py
